<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dumbodropper</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #050505;
        color: #ffffff;
        font-family: 'Courier New', Courier, monospace;
        overflow: hidden;
        user-select: none;
    }
    #gameContainer {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    canvas {
        background-color: #111111;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        border: 2px solid #333;
    }
    #uiLayer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .hud {
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
        text-shadow: 2px 2px 4px #000;
        display: flex;
        justify-content: space-between;
    }
    #levelDisplay {
        color: #00ffcc;
    }
    #deathDisplay {
        color: #ff3333;
    }
    #messageOverlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 48px;
        font-weight: bold;
        text-align: center;
        text-shadow: 3px 3px 6px #000;
        opacity: 0;
        transition: opacity 0.5s ease;
    }
    .show-message {
        opacity: 1 !important;
    }
</style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="900"></canvas>
    <div id="uiLayer">
        <div class="hud">
            <span id="levelDisplay">LEVEL: 1 / 100</span>
            <span id="deathDisplay">DEATHS: 0</span>
        </div>
        <div id="messageOverlay">PREPARE TO DROP</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const levelDisplay = document.getElementById('levelDisplay');
const deathDisplay = document.getElementById('deathDisplay');
const messageOverlay = document.getElementById('messageOverlay');

const GAME_WIDTH = 800;
const GAME_HEIGHT = 900;
const GRAVITY = 0.4;
const MAX_FALL_SPEED = 25;
const PLAYER_SPEED = 8;
const PLAYER_FRICTION = 0.85;
const TOTAL_LEVELS = 100;

let currentLevelIndex = 1;
let deaths = 0;
let gameState = 'START'; 
let cameraY = 0;
let particles = [];
let currentLevelData = null;

const keys = {
    ArrowLeft: false,
    ArrowRight: false,
    a: false,
    d: false,
    A: false,
    D: false
};

window.addEventListener('keydown', (e) => {
    if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
    if (e.key === ' ' && (gameState === 'START' || gameState === 'DEAD' || gameState === 'VICTORY')) {
        startGame();
    }
});

window.addEventListener('keyup', (e) => {
    if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
});

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 20;
        this.vy = (Math.random() - 0.5) * 20;
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.02;
        this.color = color;
        this.size = Math.random() * 8 + 2;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += GRAVITY * 0.5;
        this.life -= this.decay;
    }
    draw(ctx, camY) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - this.size/2, this.y - camY - this.size/2, this.size, this.size);
        ctx.globalAlpha = 1.0;
    }
}

class Player {
    constructor() {
        this.width = 30;
        this.height = 30;
        this.reset();
    }
    reset() {
        this.x = GAME_WIDTH / 2;
        this.y = 100;
        this.vx = 0;
        this.vy = 0;
        this.color = '#00ffcc';
        this.isDead = false;
    }
    update() {
        if (this.isDead) return;

        if (keys.ArrowLeft || keys.a || keys.A) {
            this.vx -= 1.5;
        }
        if (keys.ArrowRight || keys.d || keys.D) {
            this.vx += 1.5;
        }

        this.vx *= PLAYER_FRICTION;
        
        if (this.vx > PLAYER_SPEED) this.vx = PLAYER_SPEED;
        if (this.vx < -PLAYER_SPEED) this.vx = -PLAYER_SPEED;

        this.vy += GRAVITY;
        if (this.vy > MAX_FALL_SPEED) this.vy = MAX_FALL_SPEED;

        this.x += this.vx;
        this.y += this.vy;

        if (this.x < this.width / 2) {
            this.x = this.width / 2;
            this.vx = 0;
        }
        if (this.x > GAME_WIDTH - this.width / 2) {
            this.x = GAME_WIDTH - this.width / 2;
            this.vx = 0;
        }
    }
    draw(ctx, camY) {
        if (this.isDead) return;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillRect(this.x - this.width / 2, this.y - camY - this.height / 2, this.width, this.height);
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(this.x - 8, this.y - camY - 5, 4, 4);
        ctx.fillRect(this.x + 4, this.y - camY - 5, 4, 4);
    }
    die() {
        this.isDead = true;
        for (let i = 0; i < 50; i++) {
            particles.push(new Particle(this.x, this.y, this.color));
        }
    }
}

const player = new Player();

function generateLevelData(levelNum) {
    const data = {
        height: 3000 + (levelNum * 150),
        obstacles: [],
        safeZone: { x: 0, w: 200 }
    };

    data.safeZone.w = Math.max(80, 250 - (levelNum * 1.5));
    data.safeZone.x = Math.random() * (GAME_WIDTH - data.safeZone.w);

    const numObstacles = 10 + Math.floor(levelNum * 1.2);
    const spacing = (data.height - 800) / numObstacles;

    for (let i = 0; i < numObstacles; i++) {
        const yPos = 500 + (i * spacing);
        
        let typeVal = Math.random();
        let obsType = 'lava';
        let color = '#ff3333';
        
        if (levelNum > 10 && typeVal > 0.7) {
            obsType = 'beam';
            color = '#ffff33';
        } else if (levelNum > 30 && typeVal > 0.9) {
            obsType = 'moving';
            color = '#ff00ff';
        }

        let w = 100 + Math.random() * 300;
        let x = Math.random() * (GAME_WIDTH - w);

        if (levelNum === 100) {
            w = GAME_WIDTH - data.safeZone.w - 20;
            if (Math.random() > 0.5) {
                x = 0;
            } else {
                x = GAME_WIDTH - w;
            }
        }

        data.obstacles.push({
            x: x,
            y: yPos,
            w: w,
            h: 30,
            type: obsType,
            color: color,
            speed: (Math.random() > 0.5 ? 1 : -1) * (1 + levelNum * 0.05)
        });
    }

    if (levelNum === 1) {
        data.obstacles = [
            { x: 0, y: 800, w: 300, h: 40, type: 'lava', color: '#ff3333' },
            { x: 500, y: 1400, w: 300, h: 40, type: 'lava', color: '#ff3333' },
            { x: 200, y: 2000, w: 400, h: 40, type: 'lava', color: '#ff3333' }
        ];
        data.height = 2800;
        data.safeZone = { x: 300, w: 200 };
    }

    return data;
}

function showMessage(text, duration = 2000) {
    messageOverlay.innerText = text;
    messageOverlay.classList.add('show-message');
    if (duration > 0) {
        setTimeout(() => {
            messageOverlay.classList.remove('show-message');
        }, duration);
    }
}

function updateUI() {
    levelDisplay.innerText = `LEVEL: ${currentLevelIndex} / ${TOTAL_LEVELS}`;
    deathDisplay.innerText = `DEATHS: ${deaths}`;
}

function loadLevel(index) {
    currentLevelIndex = index;
    currentLevelData = generateLevelData(index);
    player.reset();
    particles = [];
    cameraY = 0;
    gameState = 'PLAYING';
    updateUI();
    showMessage(`LEVEL ${index}`, 1500);
}

function startGame() {
    deaths = 0;
    loadLevel(1);
}

function checkCollisions() {
    const px = player.x;
    const py = player.y;
    const pw = player.width / 2;
    const ph = player.height / 2;

    for (let obs of currentLevelData.obstacles) {
        if (px + pw > obs.x && px - pw < obs.x + obs.w &&
            py + ph > obs.y && py - ph < obs.y + obs.h) {
            handleDeath();
            return;
        }
    }

    if (py > currentLevelData.height - 100) {
        if (px > currentLevelData.safeZone.x && px < currentLevelData.safeZone.x + currentLevelData.safeZone.w) {
            if (gameState === 'PLAYING') {
                handleVictory();
            }
        } else {
            handleDeath();
        }
    }
}

function handleDeath() {
    gameState = 'DEAD';
    player.die();
    deaths++;
    updateUI();
    showMessage("SPLAT! PRESS SPACE", 0);
}

function handleVictory() {
    gameState = 'VICTORY';
    player.vy = 0;
    player.vx = 0;
    
    if (currentLevelIndex < TOTAL_LEVELS) {
        showMessage("CLEAR!", 1000);
        setTimeout(() => {
            loadLevel(currentLevelIndex + 1);
        }, 1500);
    } else {
        showMessage("YOU BEAT DUMBODROPPER!", 0);
    }
}

function updateCamera() {
    let targetCamY = player.y - GAME_HEIGHT * 0.3;
    if (targetCamY < 0) targetCamY = 0;
    if (targetCamY > currentLevelData.height - GAME_HEIGHT) targetCamY = currentLevelData.height - GAME_HEIGHT;
    
    cameraY += (targetCamY - cameraY) * 0.1;
}

function updateObstacles() {
    for (let obs of currentLevelData.obstacles) {
        if (obs.type === 'moving') {
            obs.x += obs.speed;
            if (obs.x <= 0 || obs.x + obs.w >= GAME_WIDTH) {
                obs.speed *= -1;
            }
        }
    }
}

function drawBackground() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    const gridSize = 100;
    const offsetY = cameraY % gridSize;
    
    for (let x = 0; x <= GAME_WIDTH; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, GAME_HEIGHT);
        ctx.stroke();
    }
    for (let y = 0; y <= GAME_HEIGHT; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y - offsetY);
        ctx.lineTo(GAME_WIDTH, y - offsetY);
        ctx.stroke();
    }
}

function drawLevel() {
    for (let obs of currentLevelData.obstacles) {
        if (obs.y - cameraY > GAME_HEIGHT || obs.y + obs.h - cameraY < 0) continue;
        
        ctx.fillStyle = obs.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = obs.color;
        ctx.fillRect(obs.x, obs.y - cameraY, obs.w, obs.h);
        
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(obs.x, obs.y - cameraY, obs.w, 5);
    }
    ctx.shadowBlur = 0;

    const botY = currentLevelData.height - cameraY;
    
    ctx.fillStyle = '#111111';
    ctx.fillRect(0, botY, GAME_WIDTH, GAME_HEIGHT);
    
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(0, botY, currentLevelData.safeZone.x, GAME_HEIGHT);
    ctx.fillRect(currentLevelData.safeZone.x + currentLevelData.safeZone.w, botY, GAME_WIDTH, GAME_HEIGHT);
    
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(currentLevelData.safeZone.x, botY, currentLevelData.safeZone.w, GAME_HEIGHT);
    
    ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
    ctx.fillRect(currentLevelData.safeZone.x, botY - 50, currentLevelData.safeZone.w, 50);
}

function gameLoop() {
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

    if (gameState === 'START') {
        drawBackground();
        requestAnimationFrame(gameLoop);
        return;
    }

    if (gameState === 'PLAYING') {
        player.update();
        updateObstacles();
        checkCollisions();
        updateCamera();
    }

    drawBackground();
    drawLevel();
    player.draw(ctx, cameraY);

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw(ctx, cameraY);
        if (particles[i].life <= 0) {
            particles.splice(i, 1);
        }
    }

    const wallsGradient = ctx.createLinearGradient(0, 0, 20, 0);
    wallsGradient.addColorStop(0, 'rgba(0,0,0,0.8)');
    wallsGradient.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = wallsGradient;
    ctx.fillRect(0, 0, 20, GAME_HEIGHT);

    const wallsGradientR = ctx.createLinearGradient(GAME_WIDTH, 0, GAME_WIDTH - 20, 0);
    wallsGradientR.addColorStop(0, 'rgba(0,0,0,0.8)');
    wallsGradientR.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = wallsGradientR;
    ctx.fillRect(GAME_WIDTH - 20, 0, 20, GAME_HEIGHT);

    requestAnimationFrame(gameLoop);
}

showMessage("PRESS SPACE TO DROP", 0);
gameLoop();

</script>
</body>
</html>
