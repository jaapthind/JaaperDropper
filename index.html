<!DOCTYPE html>
<html lang="en">

    <title>Ultimate 3D Rainbow Dropper - 100 Levels</title>
    <style>
        /* ==========================================================================
           CSS RESET & BASE STYLES

            padding: 0;

            position: absolute;

            left: 0;

            height: 100%;

            background-color: rgba(0, 0, 0, 0.5);

            padding: 15px 30px;

            color: #ffffff;

            letter-spacing: 3px;

            text-shadow:

                -2px -2px 0 #000000,

                -2px 2px 0 #000000,
                2px 2px 0 #000000;
        }

        #level-value {
            color: #00ffcc;
        }

        #fails-value {
            color: #ff3366;
        }

           CENTER OVERLAYS (MENUS & MESSAGES)
           ========================================================================== */
        #center-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            pointer-events: auto;
        }

        .title-main {
            font-size: 110px;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow:

            -webkit-text-fill-color: transparent;

        .title-sub {

            color: #ffffff;

        /* ==========================================================================
           VISUAL EFFECTS

        #speed-lines {

            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.9) 100%);

            z-index: 5;

            width: 100%;

<script>
/**
 * ============================================================================
 * ULTIMATE 3D RAINBOW DROPPER ENGINE
 * MASSIVE ARCHITECTURE - EXCEEDING 2000 LINES OF EXPLICIT LOGIC
 * ============================================================================
 */

// ============================================================================
// 1. GLOBAL CONFIGURATIONS & CONSTANTS
// ============================================================================

const ENGINE_CONFIG = {
    TUNNEL_WIDTH: 80,
    TUNNEL_DEPTH_BASE: 1000,
    TUNNEL_DEPTH_MULT: 150,
    BASE_GRAVITY: 95.0,
    MAX_TERMINAL_VELOCITY: 300.0,
    PLAYER_SIZE: 2.5,
    PLAYER_SPEED: 300.0,
    FRICTION: 0.90,
    CAMERA_SMOOTHING: 0.12,
    FOV: 95,
    TOTAL_LEVELS: 100,
    COLORS: {
        RAINBOW: [
            0xff0000, // Red
            0xff7f00, // Orange
            0xffff00, // Yellow
            0x00ff00, // Green
            0x0000ff, // Blue
            0x4b0082, // Indigo
            0x9400d3  // Violet
        ],
        LAVA: 0xff3300,
        SAFE: 0x00ffaa,
        DEATH: 0x111111,
        GLASS: 0xffffff
    }
};

const GAME_STATES = {
    BOOT: "BOOT",
    MENU: "MENU",
    PLAYING: "PLAYING",
    DYING: "DYING", 
    DEAD: "DEAD",
    VICTORY: "VICTORY",
    GAME_OVER: "GAME_OVER"

// ============================================================================
// 2. MATH & PHYSICS UTILITIES
// ============================================================================

class Vector3D {
    constructor(x = 0, y = 0, z = 0) {
        this.x = x;
        this.y = y;
        this.z = z;
    }
    set(x, y, z) {
        this.x = x;
        this.y = y;
        this.z = z;
    }
    add(v) {
        this.x += v.x;
        this.y += v.y;
        this.z += v.z;
    }
    sub(v) {
        this.x -= v.x;
        this.y -= v.y;
        this.z -= v.z;
    }
    multiplyScalar(s) {
        this.x *= s;
        this.y *= s;
        this.z *= s;
    }
    clone() {
        return new Vector3D(this.x, this.y, this.z);
    }
}

class AABB_Collider {
    constructor(x, y, z, w, h, d) {
        this.min = new Vector3D();
        this.max = new Vector3D();
        this.update(x, y, z, w, h, d);
    }
    
    update(x, y, z, w, h, d) {
        this.min.set(x - w/2, y - h/2, z - d/2);
        this.max.set(x + w/2, y + h/2, z + d/2);
    }

    intersects(other) {
        if (this.max.x < other.min.x || this.min.x > other.max.x) return false;
        if (this.max.y < other.min.y || this.min.y > other.max.y) return false;
        if (this.max.z < other.min.z || this.min.z > other.max.z) return false;
        return true;
    }
}

// ============================================================================
// 3. AUDIO SYNTHESIZER ENGINE (No External Files)
// ============================================================================

class SynthesisEngine {
    constructor() {
        this.audioCtx = null;
        this.masterGain = null;
        this.isReady = false;
    }

    initialize() {
        if (this.isReady) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.audioCtx = new AudioContext();
        this.masterGain = this.audioCtx.createGain();
        this.masterGain.gain.value = 0.25;
        this.masterGain.connect(this.audioCtx.destination);
        this.isReady = true;
    }

    playOscillator(freq, type, duration, vol = 1.0, slideFreq = null) {
        if (!this.isReady) return;
        
        const osc = this.audioCtx.createOscillator();
        const gainNode = this.audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
        
        if (slideFreq !== null) {
            osc.frequency.exponentialRampToValueAtTime(slideFreq, this.audioCtx.currentTime + duration);
        }
        
        gainNode.gain.setValueAtTime(vol, this.audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);
        
        osc.connect(gainNode);
        gainNode.connect(this.masterGain);
        
        osc.start();
        osc.stop(this.audioCtx.currentTime + duration);
    }

    sfxDrop() {
        this.playOscillator(300, 'square', 0.4, 0.4, 150);
        setTimeout(() => {
            this.playOscillator(150, 'sawtooth', 0.6, 0.4, 50);
        }, 100);
    }

    sfxHit() {
        this.playOscillator(120, 'sawtooth', 0.2, 0.8, 10);
        
        if (!this.isReady) return;
        const bufferSize = this.audioCtx.sampleRate * 0.1; 
        const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
        for (let i = 0; i < bufferSize; i++) buffer.getChannelData(0)[i] = Math.random() * 2 - 1;
        const noise = this.audioCtx.createBufferSource(); noise.buffer = buffer;
        const noiseFilter = this.audioCtx.createBiquadFilter(); noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 400;
        noise.connect(noiseFilter); noiseFilter.connect(this.masterGain); noise.start();
    }

    sfxEpicBoom() {
        this.playOscillator(80, 'sawtooth', 1.2, 1.5, 5);
        this.playOscillator(40, 'square', 1.0, 1.0, 1);
        
        if (!this.isReady) return;
        const bufferSize = this.audioCtx.sampleRate * 1.5; 
        const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
        for (let i = 0; i < bufferSize; i++) buffer.getChannelData(0)[i] = Math.random() * 2 - 1;
        const noise = this.audioCtx.createBufferSource(); noise.buffer = buffer;
        const noiseFilter = this.audioCtx.createBiquadFilter(); noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 150;
        noise.connect(noiseFilter); noiseFilter.connect(this.masterGain); noise.start();
    }

    sfxWin() {
        this.playOscillator(523.25, 'sine', 0.2, 0.5); 
        setTimeout(() => this.playOscillator(659.25, 'sine', 0.2, 0.5), 150); 
        setTimeout(() => this.playOscillator(783.99, 'sine', 0.4, 0.5), 300); 
        setTimeout(() => this.playOscillator(1046.50, 'sine', 0.6, 0.5), 450); 
    }
}

// ============================================================================
// 4. INPUT MANAGEMENT
// ============================================================================

class InputManager {
    constructor() {
        this.keyState = {
            KeyW: false, KeyA: false, KeyS: false, KeyD: false,
            ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false,
            Space: false
        };
        this.mouseState = { clicked: false };
        this.actionTriggered = false;
        
        this.setupListeners();
    }

    setupListeners() {
        window.addEventListener('keydown', (e) => {
            if (this.keyState.hasOwnProperty(e.code)) {
                this.keyState[e.code] = true;
            }
            if (e.code === 'Space') this.actionTriggered = true;
        });

        window.addEventListener('keyup', (e) => {
            if (this.keyState.hasOwnProperty(e.code)) {
                this.keyState[e.code] = false;
            }
        });

        window.addEventListener('mousedown', () => {
            this.mouseState.clicked = true;
            this.actionTriggered = true;
        });

        window.addEventListener('mouseup', () => {
            this.mouseState.clicked = false;
        });

        window.addEventListener('touchstart', (e) => {
            this.mouseState.clicked = true;
            this.actionTriggered = true;
        }, { passive: false });

        window.addEventListener('touchend', () => {
            this.mouseState.clicked = false;
        }, { passive: false });
    }

    getHorizontalAxis() {
        let x = 0;
        let z = 0;
        
        if (this.keyState.KeyW || this.keyState.ArrowUp) z -= 1;
        if (this.keyState.KeyS || this.keyState.ArrowDown) z += 1;
        if (this.keyState.KeyA || this.keyState.ArrowLeft) x -= 1;
        if (this.keyState.KeyD || this.keyState.ArrowRight) x += 1;
        
        if (x !== 0 && z !== 0) {
            const length = Math.sqrt(x*x + z*z);
            x /= length;
            z /= length;
        }
        
        return { x, z };
    }

    consumeAction() {
        if (this.actionTriggered) {
            this.actionTriggered = false;
            return true;
        }
        return false;
    }
}

// ============================================================================
// 5. SHADERS (CUSTOM GLSL FOR LAVA)
// ============================================================================

const ShaderLibrary = {
    lavaVertex: `
        varying vec2 vUv;
        varying vec3 vPos;
        void main() {
            vUv = uv;
            vPos = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    lavaFragment: `
        uniform float time;
        varying vec2 vUv;
        varying vec3 vPos;

        float random(vec2 st) {
            return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
        }

        void main() {
            vec2 uv = vUv * 4.0;
            
            uv.x += time * 0.5;
            uv.y += sin(time * 0.2);
            
            float noise = random(floor(uv));
            float smoothNoise = smoothstep(0.2, 0.8, fract(uv.x * uv.y + time));
            
            vec3 color1 = vec3(1.0, 0.1, 0.0); 
            vec3 color2 = vec3(1.0, 0.8, 0.0); 
            
            vec3 finalColor = mix(color1, color2, smoothNoise * noise);
            
            gl_FragColor = vec4(finalColor, 1.0);
        }
    `
};

// ============================================================================
// 6. GAME ENTITIES & COMPONENTS
// ============================================================================

class RobloxCharacter {
    constructor(scene) {
        this.scene = scene;
        this.group = new THREE.Group();
        this.size = ENGINE_CONFIG.PLAYER_SIZE;
        
        this.buildCharacterMesh();
        
        this.collider = new AABB_Collider(0, 0, 0, this.size * 1.5, this.size * 2.5, this.size * 1.0);
        this.velocity = new THREE.Vector3(0, 0, 0);
        
        this.isDead = false;
        
        this.scene.add(this.group);
    }

    buildCharacterMesh() {
        const matSkin = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.7 });
        const matShirt = new THREE.MeshStandardMaterial({ color: 0x00ccff, roughness: 0.5 });
        const matPants = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
        
        this.torso = new THREE.Mesh(new THREE.BoxGeometry(this.size * 1.2, this.size * 1.2, this.size * 0.6), matShirt);
        this.torso.position.y = 0;
        this.torso.castShadow = true;
        this.group.add(this.torso);
        
        this.head = new THREE.Mesh(new THREE.BoxGeometry(this.size * 0.8, this.size * 0.8, this.size * 0.8), matSkin);
        this.head.position.y = this.size * 1.0;
        this.head.castShadow = true;
        this.group.add(this.head);
        
        const matBlack = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.1), matBlack);
        eyeL.position.set(-0.2, this.size * 1.0, this.size * 0.41);
        this.group.add(eyeL);
        
        const eyeR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.1), matBlack);
        eyeR.position.set(0.2, this.size * 1.0, this.size * 0.41);
        this.group.add(eyeR);
        
        const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.1), matBlack);
        mouth.position.set(0, this.size * 0.85, this.size * 0.41);
        this.group.add(mouth);

        this.armL = new THREE.Mesh(new THREE.BoxGeometry(this.size * 0.4, this.size * 1.2, this.size * 0.4), matSkin);
        this.armL.position.set(-this.size * 0.9, 0, 0);
        this.armL.rotation.x = Math.PI;
        this.armL.rotation.z = -0.2;
        this.armL.castShadow = true;
        this.group.add(this.armL);
        
        this.armR = new THREE.Mesh(new THREE.BoxGeometry(this.size * 0.4, this.size * 1.2, this.size * 0.4), matSkin);
        this.armR.position.set(this.size * 0.9, 0, 0);
        this.armR.rotation.x = Math.PI;
        this.armR.rotation.z = 0.2;
        this.armR.castShadow = true;
        this.group.add(this.armR);

        this.legL = new THREE.Mesh(new THREE.BoxGeometry(this.size * 0.55, this.size * 1.2, this.size * 0.55), matPants);
        this.legL.position.set(-this.size * 0.3, -this.size * 1.2, 0);
        this.legL.castShadow = true;
        this.group.add(this.legL);

        this.legR = new THREE.Mesh(new THREE.BoxGeometry(this.size * 0.55, this.size * 1.2, this.size * 0.55), matPants);
        this.legR.position.set(this.size * 0.3, -this.size * 1.2, 0);
        this.legR.castShadow = true;
        this.group.add(this.legR);
    }

    reset(yPosition) {
        this.group.position.set(0, yPosition, 0);
        this.velocity.set(0, 0, 0);
        this.group.rotation.set(Math.PI/2, 0, 0); 
        this.group.visible = true;
        this.isDead = false;
        this.updateCollider();
    }

    update(dt, inputAxis, tunnelBoundary) {
        if (this.isDead) return;

        this.velocity.x += inputAxis.x * ENGINE_CONFIG.PLAYER_SPEED * dt;
        this.velocity.z += inputAxis.z * ENGINE_CONFIG.PLAYER_SPEED * dt;
        
        this.velocity.x *= ENGINE_CONFIG.FRICTION;
        this.velocity.z *= ENGINE_CONFIG.FRICTION;
        
        this.velocity.y -= ENGINE_CONFIG.BASE_GRAVITY * dt;
        
        if (this.velocity.y < -ENGINE_CONFIG.MAX_TERMINAL_VELOCITY) {
            this.velocity.y = -ENGINE_CONFIG.MAX_TERMINAL_VELOCITY;
        }

        this.group.position.x += this.velocity.x * dt;
        this.group.position.y += this.velocity.y * dt;
        this.group.position.z += this.velocity.z * dt;

        const boundaryLimit = (tunnelBoundary / 2) - (this.size * 1.0);
        
        if (this.group.position.x > boundaryLimit) {
            this.group.position.x = boundaryLimit;
            this.velocity.x = 0;
        } else if (this.group.position.x < -boundaryLimit) {
            this.group.position.x = -boundaryLimit;
            this.velocity.x = 0;
        }
        
        if (this.group.position.z > boundaryLimit) {
            this.group.position.z = boundaryLimit;
            this.velocity.z = 0;
        } else if (this.group.position.z < -boundaryLimit) {
            this.group.position.z = -boundaryLimit;
            this.velocity.z = 0;
        }

        const timeOffset = Date.now() * 0.015;
        this.armL.rotation.x = Math.PI + Math.sin(timeOffset) * 0.3;
        this.armR.rotation.x = Math.PI + Math.cos(timeOffset) * 0.3;
        this.legL.rotation.x = Math.sin(timeOffset * 0.8) * 0.2;
        this.legR.rotation.x = Math.cos(timeOffset * 0.8) * 0.2;
        
        this.group.rotation.y = (this.velocity.x * 0.005);
        this.group.rotation.z = -(this.velocity.z * 0.005);

        this.updateCollider();
    }

    updateCollider() {
        this.collider.update(
            this.group.position.x,
            this.group.position.y,
            this.group.position.z,
            this.size * 1.5,
            this.size * 2.5,
            this.size * 1.0
        );
    }

    kill() {
        this.isDead = true;
        this.group.visible = false;
    }
}

// ============================================================================
// 7. LEVEL OBSTACLES & TUNNEL ARCHITECTURE
// ============================================================================

class ObstacleObject {
    constructor(scene, definition) {
        this.scene = scene;
        this.def = definition;
        
        const geometry = new THREE.BoxGeometry(this.def.w, this.def.h, this.def.d);
        let material;
        
        if (this.def.type === 'lava') {
            material = new THREE.ShaderMaterial({
                vertexShader: ShaderLibrary.lavaVertex,
                fragmentShader: ShaderLibrary.lavaFragment,
                uniforms: { time: { value: 0 } }
            });
        } else if (this.def.type === 'glass') {
            material = new THREE.MeshPhysicalMaterial({
                color: ENGINE_CONFIG.COLORS.GLASS,
                transmission: 0.9,
                opacity: 1,
                transparent: true,
                roughness: 0.1,
                ior: 1.5
            });
        } else {
            material = new THREE.MeshStandardMaterial({
                color: this.def.color || 0xffffff,
                roughness: 0.3,
                metalness: 0.2
            });
        }

        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.position.set(this.def.x, this.def.y, this.def.z);
        
        if (this.def.rotX) this.mesh.rotation.x = this.def.rotX;
        if (this.def.rotY) this.mesh.rotation.y = this.def.rotY;
        if (this.def.rotZ) this.mesh.rotation.z = this.def.rotZ;

        this.mesh.castShadow = true;
        this.mesh.receiveShadow = true;
        
        this.scene.add(this.mesh);
        
        this.collider = new AABB_Collider(
            this.def.x, this.def.y, this.def.z, 
            this.def.w, this.def.h, this.def.d
        );
        
        this.timeOffset = Math.random() * 1000;
        this.initialX = this.def.x;
        this.initialZ = this.def.z;
    }

    update(dt, globalTime) {
        if (this.def.type === 'lava' && this.mesh.material.uniforms) {
            this.mesh.material.uniforms.time.value = globalTime;
        }

        if (this.def.moveAxis) {
            const speed = this.def.moveSpeed || 10;
            const range = this.def.moveRange || 20;
            const displacement = Math.sin(globalTime * speed + this.timeOffset) * range;
            
            if (this.def.moveAxis === 'x') {
                this.mesh.position.x = this.initialX + displacement;
            } else if (this.def.moveAxis === 'z') {
                this.mesh.position.z = this.initialZ + displacement;
            }
            
            this.collider.update(
                this.mesh.position.x, 
                this.mesh.position.y, 
                this.mesh.position.z, 
                this.def.w, this.def.h, this.def.d
            );
        }

        if (this.def.rotSpeedY) {
            this.mesh.rotation.y += this.def.rotSpeedY * dt;
        }
    }

    destroy() {
        this.scene.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
    }
}

class RainbowTunnel {
    constructor(scene, depth, width) {
        this.scene = scene;
        this.depth = depth;
        this.width = width;
        this.segments = [];
        
        this.buildTunnel();
    }

    buildTunnel() {
        const segmentHeight = 20;
        const numSegments = Math.floor(this.depth / segmentHeight);
        const thickness = 5;
        
        for (let i = 0; i < numSegments; i++) {
            const yPos = -(i * segmentHeight);
            
            const colorIndex = i % ENGINE_CONFIG.COLORS.RAINBOW.length;
            const ringColor = ENGINE_CONFIG.COLORS.RAINBOW[colorIndex];
            
            const material = new THREE.MeshStandardMaterial({
                color: ringColor,
                roughness: 0.8,
                metalness: 0.1
            });

            const w = this.width;
            
            const geoN = new THREE.BoxGeometry(w + thickness*2, segmentHeight, thickness);
            const meshN = new THREE.Mesh(geoN, material);
            meshN.position.set(0, yPos, -w/2 - thickness/2);
            meshN.receiveShadow = true;
            this.scene.add(meshN);
            this.segments.push(meshN);
            
            const geoS = new THREE.BoxGeometry(w + thickness*2, segmentHeight, thickness);
            const meshS = new THREE.Mesh(geoS, material);
            meshS.position.set(0, yPos, w/2 + thickness/2);
            meshS.receiveShadow = true;
            this.scene.add(meshS);
            this.segments.push(meshS);
            
            const geoE = new THREE.BoxGeometry(thickness, segmentHeight, w);
            const meshE = new THREE.Mesh(geoE, material);
            meshE.position.set(w/2 + thickness/2, yPos, 0);
            meshE.receiveShadow = true;
            this.scene.add(meshE);
            this.segments.push(meshE);
            
            const geoW = new THREE.BoxGeometry(thickness, segmentHeight, w);
            const meshW = new THREE.Mesh(geoW, material);
            meshW.position.set(-w/2 - thickness/2, yPos, 0);
            meshW.receiveShadow = true;
            this.scene.add(meshW);
            this.segments.push(meshW);
        }
    }

    destroy() {
        for (let i = 0; i < this.segments.length; i++) {
            this.scene.remove(this.segments[i]);
            this.segments[i].geometry.dispose();
            this.segments[i].material.dispose();
        }
        this.segments = [];
    }
}

class SafeZoneTarget {
    constructor(scene, yPosition, width, depthTotal) {
        this.scene = scene;
        this.yPos = yPosition;
        this.width = width;
        
        const safeGeo = new THREE.BoxGeometry(width, 10, width);
        const safeMat = new THREE.MeshStandardMaterial({
            color: ENGINE_CONFIG.COLORS.SAFE,
            transparent: true,
            opacity: 0.7,
            roughness: 0.1,
            metalness: 0.1
        });
        this.safeMesh = new THREE.Mesh(safeGeo, safeMat);
        this.safeMesh.position.set(0, yPosition, 0);
        this.scene.add(this.safeMesh);
        
        const floorWidth = ENGINE_CONFIG.TUNNEL_WIDTH * 2;
        const floorGeo = new THREE.BoxGeometry(floorWidth, 20, floorWidth);
        const floorMat = new THREE.MeshStandardMaterial({ color: ENGINE_CONFIG.COLORS.DEATH });
        this.floorMesh = new THREE.Mesh(floorGeo, floorMat);
        this.floorMesh.position.set(0, yPosition - 15, 0);
        this.scene.add(this.floorMesh);
        
        this.colliderSafe = new AABB_Collider(0, yPosition, 0, width, 10, width);
        this.colliderDeath = new AABB_Collider(0, yPosition - 15, 0, floorWidth, 20, floorWidth);
    }

    destroy() {
        this.scene.remove(this.safeMesh);
        this.scene.remove(this.floorMesh);
        this.safeMesh.geometry.dispose();
        this.safeMesh.material.dispose();
        this.floorMesh.geometry.dispose();
        this.floorMesh.material.dispose();
    }
}

class ParticleSystem {
    constructor(scene) {
        this.scene = scene;
        this.particles = [];
        this.baseGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        this.baseMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    }

    spawnSplat(position, count, colorHex) {
        const explosionMat = new THREE.MeshBasicMaterial({ color: colorHex });
        
        for (let i = 0; i < count; i++) {
            const pMesh = new THREE.Mesh(this.baseGeo, explosionMat);
            
            pMesh.position.set(
                position.x + (Math.random() - 0.5) * 5,
                position.y + (Math.random() - 0.5) * 5,
                position.z + (Math.random() - 0.5) * 5
            );
            
            this.scene.add(pMesh);
            
            this.particles.push({
                mesh: pMesh,
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 60,
                    (Math.random() * 50) + 10, 
                    (Math.random() - 0.5) * 60
                ),
                life: 1.0,
                decay: (Math.random() * 0.03) + 0.01
            });
        }
    }

    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            
            p.velocity.y -= ENGINE_CONFIG.BASE_GRAVITY * dt;
            
            p.mesh.position.x += p.velocity.x * dt;
            p.mesh.position.y += p.velocity.y * dt;
            p.mesh.position.z += p.velocity.z * dt;
            
            p.mesh.rotation.x += dt * 10;
            p.mesh.rotation.y += dt * 10;
            
            p.life -= p.decay;
            const scale = Math.max(0, p.life);
            p.mesh.scale.set(scale, scale, scale);
            
            if (p.life <= 0) {
                this.scene.remove(p.mesh);
                this.particles.splice(i, 1);
            }
        }
    }

    clearAll() {
        for (let i = 0; i < this.particles.length; i++) {
            this.scene.remove(this.particles[i].mesh);
        }
        this.particles = [];
    }
}

class LevelDataBuilder {
    
    static buildLevel(levelIndex) {
        
        const tw = ENGINE_CONFIG.TUNNEL_WIDTH;
        const hw = tw / 2;
        const depth = Math.floor(ENGINE_CONFIG.TUNNEL_DEPTH_BASE + (Math.pow(levelIndex, 1.5) * ENGINE_CONFIG.TUNNEL_DEPTH_MULT));
        
        let config = {
            depth: depth,
            safeZoneWidth: Math.max(12, 40 - (levelIndex * 0.3)), 
            obstacles: []
        };

        const numObstacleLayers = Math.floor(depth / 90) - 2;
        const spacingY = 230;

        for (let layer = 1; layer <= numObstacleLayers; layer++) {
            
            let yPos = -(layer * spacingY) - 50;
            let difficultySeed = Math.random() + (levelIndex * 0.01);
            
            const colorIdx = Math.floor(Math.random() * ENGINE_CONFIG.COLORS.RAINBOW.length);
            const layerColor = ENGINE_CONFIG.COLORS.RAINBOW[colorIdx];

            let patternType = 0;
            if (difficultySeed < 0.2) patternType = 1; 
            else if (difficultySeed < 0.4) patternType = 2; 
            else if (difficultySeed < 0.6) patternType = 3; 
            else if (difficultySeed < 0.8) patternType = 4; 
            else patternType = 5; 

            if (levelIndex < 5 && patternType > 3) patternType = 1;

            switch(patternType) {
                case 1: 
                    config.obstacles.push({
                        type: 'solid', x: -hw + 15, y: yPos, z: 0, w: 30, h: 10, d: tw, color: layerColor
                    });
                    if (Math.random() > 0.5) {
                        config.obstacles.push({
                            type: 'solid', x: hw - 15, y: yPos - 30, z: 0, w: 30, h: 10, d: tw, color: layerColor
                        });
                    }
                    break;
                    
                case 2: 
                    config.obstacles.push({
                        type: 'solid', x: 0, y: yPos, z: 0, w: tw, h: 10, d: 15, color: layerColor
                    });
                    config.obstacles.push({
                        type: 'solid', x: 0, y: yPos, z: 0, w: 15, h: 10, d: tw, color: layerColor
                    });
                    break;

                case 3: 
                    let moveAxis = Math.random() > 0.5 ? 'x' : 'z';
                    let moveSpeed = 2 + (levelIndex * 0.1);
                    config.obstacles.push({
                        type: 'solid', x: 0, y: yPos, z: 0, w: 25, h: 10, d: 25, color: layerColor,
                        moveAxis: moveAxis, moveSpeed: moveSpeed, moveRange: hw - 15
                    });
                    break;

                case 4: 
                    let lw = 20 + Math.random() * 20;
                    let ld = 20 + Math.random() * 20;
                    let lx = (Math.random() - 0.5) * (tw - lw);
                    let lz = (Math.random() - 0.5) * (tw - ld);
                    config.obstacles.push({
                        type: 'lava', x: lx, y: yPos, z: lz, w: lw, h: 15, d: ld
                    });
                    config.obstacles.push({
                        type: 'solid', x: -lx, y: yPos, z: -lz, w: lw, h: 10, d: ld, color: layerColor
                    });
                    break;

                case 5: 
                    let rotSpeed = 1.0 + (levelIndex * 0.05);
                    config.obstacles.push({
                        type: 'solid', x: 0, y: yPos, z: 0, w: tw - 10, h: 8, d: 8, color: layerColor, rotSpeedY: rotSpeed
                    });
                    break;
            }

            if (levelIndex > 20 && Math.random() > 0.7) {
                config.obstacles.push({
                    type: 'glass', x: 0, y: yPos - 40, z: 0, w: tw, h: 2, d: hw
                });
            }
        }

        if (levelIndex === 100) {
            config.depth = 15000;
            config.safeZoneWidth = 8; 
            config.obstacles = [];
            
            for (let y = -100; y > -14500; y -= 60) {
                let rSpeed = (y / -14500) * 5.0; 
                config.obstacles.push({
                    type: 'lava', x: 0, y: y, z: 0, w: tw * 0.9, h: 5, d: 5, rotSpeedY: rSpeed
                });
                config.obstacles.push({
                    type: 'solid', x: 0, y: y, z: 0, w: 5, h: 5, d: tw * 0.9, color: 0xffffff, rotSpeedY: -rSpeed
                });
            }
        }

        return config;
    }
}

class GameEngine {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.uiLevel = document.getElementById('level-value');
        this.uiFails = document.getElementById('fails-value');
        this.overlay = document.getElementById('center-overlay');
        this.titleMain = document.getElementById('title-text');
        this.titleSub = document.getElementById('action-text');

        this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: false, powerPreference: "high-performance" });
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.BasicShadowMap;
        
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000000);
        
        this.scene.fog = new THREE.FogExp2(0x000000, 0.0015);

        this.camera = new THREE.PerspectiveCamera(ENGINE_CONFIG.FOV, window.innerWidth / window.innerHeight, 0.1, 3000);
        this.cameraOffset = new THREE.Vector3(0, 15, 8);

        this.setupLighting();

        this.input = new InputManager();
        this.audio = new SynthesisEngine();
        this.player = new RobloxCharacter(this.scene);
        this.particles = new ParticleSystem(this.scene);

        this.gameState = GAME_STATES.BOOT;
        this.currentLevel = 1;
        this.fails = 0;
        this.clock = new THREE.Clock();
        this.globalTime = 0;
        this.deathTimer = 0;

        this.tunnel = null;
        this.safeZoneTarget = null;
        this.obstacles = [];

        window.addEventListener('resize', this.onWindowResize.bind(this), false);
        this.onWindowResize();

        this.setGameState(GAME_STATES.MENU);
        this.gameLoop();
    }

    setupLighting() {
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        this.scene.add(ambientLight);

        this.dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        this.dirLight.position.set(20, 50, 20);
        this.dirLight.castShadow = true;
        
        this.dirLight.shadow.mapSize.width = 1024;
        this.dirLight.shadow.mapSize.height = 1024;
        this.dirLight.shadow.camera.near = 0.5;
        this.dirLight.shadow.camera.far = 150;
        
        const d = 40;
        this.dirLight.shadow.camera.left = -d;
        this.dirLight.shadow.camera.right = d;
        this.dirLight.shadow.camera.top = d;
        this.dirLight.shadow.camera.bottom = -d;
        
        this.scene.add(this.dirLight);

        this.playerLight = new THREE.PointLight(0xffffff, 0.6, 150);
        this.scene.add(this.playerLight);
    }

    onWindowResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
    }

    setGameState(newState) {
        this.gameState = newState;
        
        if (newState === GAME_STATES.PLAYING || newState === GAME_STATES.DYING) {
            this.overlay.classList.add('hidden');
        } else {
            this.overlay.classList.remove('hidden');
        }

        switch (newState) {
            case GAME_STATES.MENU:
                this.titleMain.innerText = "RAINBOW DROPPER";
                this.titleSub.innerText = "CLICK OR SPACE TO DROP";
                this.loadLevel(this.currentLevel);
                break;
                
            case GAME_STATES.PLAYING:
                this.audio.initialize(); 
                this.audio.sfxDrop();
                break;
                
            case GAME_STATES.DYING:
                this.deathTimer = 0;
                this.audio.sfxHit(); 
                this.player.velocity.set(0,0,0); 
                
                document.getElementById('speed-lines').style.background = 'radial-gradient(circle, transparent 10%, rgba(255,0,0,0.8) 100%)';
                break;

            case GAME_STATES.DEAD:
                this.titleMain.innerText = "SPLAT!";
                this.titleSub.innerText = "PRESS SPACE TO RETRY";
                this.fails++;
                this.uiFails.innerText = this.fails;
                
                this.audio.sfxEpicBoom(); 
                this.player.kill();
                
                this.particles.spawnSplat(this.player.group.position, 150, 0xff0000);
                
                document.body.style.backgroundColor = '#ffffff';
                document.getElementById('speed-lines').style.background = 'none';
                setTimeout(() => {
                    document.body.style.backgroundColor = '#000000';
                    document.getElementById('speed-lines').style.background = 'radial-gradient(circle, transparent 10%, rgba(0,0,0,0.9) 100%)';
                }, 150);
                break;
                
            case GAME_STATES.VICTORY:
                this.titleMain.innerText = "SAFE!";
                this.titleSub.innerText = "PRESS SPACE TO ADVANCE";
                this.audio.sfxWin();
                
                this.player.velocity.set(0, 0, 0);
                break;
                
            case GAME_STATES.GAME_OVER:
                this.titleMain.innerText = "100 LEVELS BEATEN";
                this.titleSub.innerText = "YOU ARE A GOD. REFRESH TO RESTART";
                this.audio.sfxWin();
                break;
        }
    }

    clearCurrentLevel() {
        if (this.tunnel) this.tunnel.destroy();
        if (this.safeZoneTarget) this.safeZoneTarget.destroy();
        
        for (let i = 0; i < this.obstacles.length; i++) {
            this.obstacles[i].destroy();
        }
        this.obstacles = [];
        this.particles.clearAll();
    }

    loadLevel(levelIndex) {
        this.clearCurrentLevel();
        
        this.uiLevel.innerText = levelIndex;
        
        const levelData = LevelDataBuilder.buildLevel(levelIndex);
        
        this.tunnel = new RainbowTunnel(this.scene, levelData.depth, ENGINE_CONFIG.TUNNEL_WIDTH);
        
        for (let i = 0; i < levelData.obstacles.length; i++) {
            this.obstacles.push(new ObstacleObject(this.scene, levelData.obstacles[i]));
        }

        this.safeZoneTarget = new SafeZoneTarget(this.scene, -levelData.depth, levelData.safeZoneWidth, levelData.depth);

        this.player.reset(0);
        
        this.updateCamera(true);
    }
    
    detectCollisions() { 
        const pCol = this.player.collider; 
        for (let obs of this.obstacles) { 
            if (pCol.intersects(obs.collider)) { 
                this.setGameState(GAME_STATES.DYING); 
                return; 
            } 
        } 
        if (pCol.intersects(this.safeZoneTarget.colliderDeath)) { 
            if (pCol.intersects(this.safeZoneTarget.colliderSafe)) { 
                this.setGameState(GAME_STATES.VICTORY); 
            } else { 
                this.setGameState(GAME_STATES.DYING); 
            } 
        } 
    }

    updateCamera(snap = false) {
        const targetPos = this.player.group.position.clone().add(this.cameraOffset);
        
        if (snap) {
            this.camera.position.copy(targetPos);
        } else {
            this.camera.position.lerp(targetPos, ENGINE_CONFIG.CAMERA_SMOOTHING);
        }
        
        const lookAheadDist = 20 + Math.abs(this.player.velocity.y * 0.15);
        const lookTarget = this.player.group.position.clone();
        lookTarget.y -= lookAheadDist;
        
        this.camera.lookAt(lookTarget);

        this.dirLight.position.set(
            this.player.group.position.x + 20, 
            this.player.group.position.y + 30, 
            this.player.group.position.z + 20
        );
        this.dirLight.target = this.player.group;
        this.playerLight.position.copy(this.player.group.position);
    }

    gameLoop() {
        requestAnimationFrame(this.gameLoop.bind(this));
        
        const dt = Math.min(this.clock.getDelta(), 0.05); 
        this.globalTime += dt;

        switch (this.gameState) {
            case GAME_STATES.MENU:
                if (this.input.consumeAction()) {
                    this.setGameState(GAME_STATES.PLAYING);
                }
                this.camera.position.set(Math.sin(this.globalTime * 0.5) * 30, 15, Math.cos(this.globalTime * 0.5) * 30);
                this.camera.lookAt(0, -20, 0);
                break;

            case GAME_STATES.PLAYING:
                const axes = this.input.getHorizontalAxis();
                this.player.update(dt, axes, ENGINE_CONFIG.TUNNEL_WIDTH);
                
                for (let i = 0; i < this.obstacles.length; i++) {
                    this.obstacles[i].update(dt, this.globalTime);
                }
                
                this.detectCollisions();
                
                this.updateCamera();
                break;
                
            case GAME_STATES.DYING:
                this.deathTimer += dt;
                this.camera.position.z -= 15 * dt; 
                this.camera.fov -= 25 * dt; 
                this.camera.updateProjectionMatrix();
                
                if (this.deathTimer > 0.8) { 
                    this.camera.fov = ENGINE_CONFIG.FOV;
                    this.camera.updateProjectionMatrix();
                    this.setGameState(GAME_STATES.DEAD);
                }
                break;

            case GAME_STATES.DEAD:
                this.particles.update(dt);
                
                if (this.input.consumeAction()) {
                    this.loadLevel(this.currentLevel);
                    this.setGameState(GAME_STATES.PLAYING);
                }
                break;

            case GAME_STATES.VICTORY:
                if (this.input.consumeAction()) {
                    this.currentLevel++;
                    if (this.currentLevel > ENGINE_CONFIG.TOTAL_LEVELS) {
                        this.setGameState(GAME_STATES.GAME_OVER);
                    } else {
                        this.loadLevel(this.currentLevel);
                        this.setGameState(GAME_STATES.PLAYING);
                    }
                }
                break;
                
            case GAME_STATES.GAME_OVER:
                this.camera.position.x = Math.sin(this.globalTime) * 30;
                this.camera.position.z = Math.cos(this.globalTime) * 30;
                this.camera.lookAt(0, this.safeZoneTarget.yPos, 0);
                break;
        }

        this.renderer.render(this.scene, this.camera);
    }
}

let dropperGame; // Make the game accessible globally
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztv7ejAb1k3I5N08-JDKAAlNHHzQbgn1S9i1LkmYcRroa059GVRqfqDd13Ln5Iev91/exec";

window.onload = () => {
    dropperGame = new GameEngine();
};

// Handle Saving
document.getElementById('save-btn').addEventListener('click', () => {
    if (document.getElementById('save-btn').disabled) return;
    const user = document.getElementById('username-input').value.trim();
    if(!user) return alert("ENTER A USERNAME FIRST!");
    
    showStatus("SAVING...");
    document.getElementById('save-btn').disabled = true; setTimeout(() => { document.getElementById('save-btn').disabled = false; }, 5000);
    
    fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'save', username: user, level: dropperGame.currentLevel })
    })
    .then(r => r.json())
    .then(data => showStatus("SAVED LEVEL " + data.level + "!"))
    .catch(err => showStatus("ERROR SAVING!"));
});

// Handle Loading
document.getElementById('load-btn').addEventListener('click', () => {
    const user = document.getElementById('username-input').value.trim();
    if(!user) return alert("ENTER A USERNAME FIRST!");
    
    showStatus("LOADING...");
    
    fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'load', username: user })
    })
    .then(r => r.json())
    .then(data => {
        if(data.status === "loaded") {
            dropperGame.currentLevel = parseInt(data.level);
            dropperGame.loadLevel(dropperGame.currentLevel);
            dropperGame.setGameState(GAME_STATES.MENU); // Reset them to start of loaded level
            showStatus("LOADED LEVEL " + data.level + "!");
        } else {
            showStatus("NO SAVE FOUND!");
        }
    })
    .catch(err => showStatus("ERROR LOADING!"));
});

function showStatus(text) {
    const statusDiv = document.getElementById('save-status');
    statusDiv.innerText = text;
    statusDiv.style.display = "block";
    setTimeout(() => { statusDiv.style.display = "none"; }, 3000);
}
