<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ultimate 3D Dropper</title>
<style>
    :root {
        --ui-font: 'Impact', 'Arial Black', sans-serif;
    }
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
        font-family: var(--ui-font);
        user-select: none;
        -webkit-user-select: none;
    }
    #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }
    #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .hud-top {
        display: flex;
        justify-content: space-between;
        padding: 30px;
    }
    .hud-element {
        font-size: 36px;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 
            3px 3px 0 #000,
            -1px -1px 0 #000,
            1px -1px 0 #000,
            -1px 1px 0 #000,
            1px 1px 0 #000;
        filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
    }
    #level-display { color: #00ffff; }
    #fails-display { color: #ff0055; }
    
    #center-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 100%;
    }
    .main-title {
        font-size: 96px;
        color: #fff;
        margin: 0;
        padding: 0;
        text-shadow: 4px 4px 0 #000, 8px 8px 20px rgba(0,0,0,0.8);
        background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: rainbowHue 5s linear infinite;
    }
    .sub-title {
        font-size: 48px;
        color: #fff;
        text-shadow: 2px 2px 0 #000;
        margin-top: 20px;
        animation: pulse 1s infinite alternate;
    }
    #speed-lines {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
        opacity: 0.5;
        z-index: 5;
        pointer-events: none;
    }
    
    .hidden { display: none !important; }

    @keyframes rainbowHue {
        0% { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(360deg); }
    }
    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(1.05); opacity: 1; }
    }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<canvas id="game-canvas"></canvas>
<div id="speed-lines"></div>

<div id="ui-layer">
    <div class="hud-top">
        <div id="level-display" class="hud-element">Level: 1</div>
        <div id="fails-display" class="hud-element">Fails: 0</div>
    </div>
    
    <div id="center-overlay">
        <h1 class="main-title" id="title-text">THE DROPPER</h1>
        <div class="sub-title" id="action-text">PRESS SPACE / CLICK TO DROP</div>
    </div>
</div>

<script>
/**
 * ============================================================================
 * ULTIMATE 3D DROPPER ENGINE
 * CORE ARCHITECTURE, PHYSICS, RENDERING, AND LEVEL DATA
 * ============================================================================
 */

// ============================================================================
// SYSTEM CONFIGURATION & CONSTANTS
// ============================================================================
const ENGINE_CONFIG = {
    TUNNEL_WIDTH: 60,
    TUNNEL_DEPTH: 60,
    BASE_GRAVITY: 80.0,
    MAX_TERMINAL_VELOCITY: 250.0,
    PLAYER_SIZE: 2.0,
    PLAYER_SPEED: 45.0,
    FRICTION: 0.88,
    CAMERA_SMOOTHING: 0.15,
    FOV: 90,
    TOTAL_LEVELS: 20,
    COLORS: {
        RAINBOW: [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x0000ff, 0x4b0082, 0x9400d3],
        NEON: [0xff0055, 0x00ffcc, 0xccff00, 0xb000ff],
        DANGER: 0xff0000,
        SAFE: 0x00ff00
    }
};

const GAME_STATES = {
    BOOT: 0,
    MENU: 1,
    PLAYING: 2,
    DEAD: 3,
    VICTORY: 4,
    GAME_OVER: 5
};

// ============================================================================
// AUDIO SYNTHESIZER (No external assets)
// ============================================================================
class AudioEngine {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.3;
        this.masterGain.connect(this.ctx.destination);
        this.initialized = false;
    }

    init() {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        this.initialized = true;
    }

    playTone(freq, type, duration, vol=1.0) {
        if (!this.initialized) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(this.masterGain);
        
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }

    playDropSound() {
        this.playTone(200, 'square', 0.5, 0.5);
        setTimeout(() => this.playTone(150, 'sawtooth', 0.8, 0.5), 100);
    }

    playDeathSound() {
        if (!this.initialized) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(1.0, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.5);
    }

    playWinSound() {
        this.playTone(440, 'sine', 0.2);
        setTimeout(() => this.playTone(554, 'sine', 0.2), 100);
        setTimeout(() => this.playTone(659, 'sine', 0.4), 200);
        setTimeout(() => this.playTone(880, 'sine', 0.6), 300);
    }
}

// ============================================================================
// CUSTOM SHADERS (To match image visual style perfectly)
// ============================================================================
const Shaders = {
    // Creates the stepped rainbow tunnel effect seen in Roblox images
    tunnelVertex: `
        varying vec2 vUv;
        varying vec3 vPos;
        void main() {
            vUv = uv;
            vPos = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    tunnelFragment: `
        uniform float time;
        uniform float length;
        uniform vec3 colorA;
        uniform vec3 colorB;
        varying vec2 vUv;
        varying vec3 vPos;

        // HSV to RGB conversion
        vec3 hsv2rgb(vec3 c) {
            vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
            vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
            return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
        }

        void main() {
            // Create stepped bands down the Y axis
            float bandSize = 15.0;
            float stepVal = floor(vPos.y / bandSize);
            
            // Calculate hue based on depth to create rainbow spiral
            float hue = fract(stepVal * 0.05 + time * 0.2);
            
            // Add grid lines for that distinct roblox block look
            float edgeX = abs(fract(vPos.x / bandSize) - 0.5) * 2.0;
            float edgeZ = abs(fract(vPos.z / bandSize) - 0.5) * 2.0;
            float edgeY = abs(fract(vPos.y / bandSize) - 0.5) * 2.0;
            
            float grid = max(max(edgeX, edgeZ), edgeY);
            float line = smoothstep(0.85, 0.95, grid);
            
            vec3 baseColor = hsv2rgb(vec3(hue, 1.0, 0.8));
            vec3 finalColor = mix(baseColor, vec3(0.0), line * 0.5); // Darken edges
            
            // Distance fog
            float depth = gl_FragCoord.z / gl_FragCoord.w;
            float fogFactor = smoothstep(200.0, 1000.0, depth);
            
            gl_FragColor = mix(vec4(finalColor, 1.0), vec4(0.0, 0.0, 0.0, 1.0), fogFactor);
        }
    `,
    
    // Lava material for obstacles
    lavaFragment: `
        uniform float time;
        varying vec2 vUv;
        varying vec3 vPos;

        void main() {
            vec2 uv = vUv * 3.0;
            float n = fract(sin(dot(uv.xy, vec2(12.9898,78.233))) * 43758.5453 + time);
            vec3 color = mix(vec3(1.0, 0.1, 0.0), vec3(1.0, 0.6, 0.0), n);
            gl_FragColor = vec4(color, 1.0);
        }
    `
};

// ============================================================================
// MATH & COLLISION UTILS
// ============================================================================
class AABB {
    constructor(x, y, z, w, h, d) {
        this.update(x, y, z, w, h, d);
    }
    
    update(x, y, z, w, h, d) {
        this.min = new THREE.Vector3(x - w/2, y - h/2, z - d/2);
        this.max = new THREE.Vector3(x + w/2, y + h/2, z + d/2);
    }

    intersects(other) {
        return (this.min.x <= other.max.x && this.max.x >= other.min.x) &&
               (this.min.y <= other.max.y && this.max.y >= other.min.y) &&
               (this.min.z <= other.max.z && this.max.z >= other.min.z);
    }
}

// ============================================================================
// INPUT MANAGEMENT
// ============================================================================
class InputController {
    constructor() {
        this.keys = {};
        this.mouse = { x: 0, y: 0, clicked: false };
        this.touches = [];
        
        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        window.addEventListener('mousedown', e => this.mouse.clicked = true);
        window.addEventListener('mouseup', e => this.mouse.clicked = false);
        window.addEventListener('touchstart', e => {
            this.mouse.clicked = true;
            this.touches = e.touches;
        }, {passive: false});
        window.addEventListener('touchend', e => {
            this.mouse.clicked = false;
            this.touches = e.touches;
        }, {passive: false});
        window.addEventListener('touchmove', e => {
            this.touches = e.touches;
        }, {passive: false});
    }

    getAxis() {
        let x = 0, z = 0;
        if (this.keys['KeyW'] || this.keys['ArrowUp']) z -= 1;
        if (this.keys['KeyS'] || this.keys['ArrowDown']) z += 1;
        if (this.keys['KeyA'] || this.keys['ArrowLeft']) x -= 1;
        if (this.keys['KeyD'] || this.keys['ArrowRight']) x += 1;
        
        // Touch controls (virtual joystick mapping)
        if (this.touches.length > 0) {
            const touch = this.touches[0];
            const hw = window.innerWidth / 2;
            const hh = window.innerHeight / 2;
            x = (touch.clientX - hw) / hw;
            z = (touch.clientY - hh) / hh;
            
            // Normalize
            const len = Math.sqrt(x*x + z*z);
            if (len > 1) {
                x /= len;
                z /= len;
            }
        }

        return new THREE.Vector2(x, z);
    }

    isActionPressed() {
        return this.keys['Space'] || this.mouse.clicked;
    }
    
    resetAction() {
        this.keys['Space'] = false;
        this.mouse.clicked = false;
    }
}

// ============================================================================
// ENTITIES
// ============================================================================
class Player {
    constructor(scene) {
        this.scene = scene;
        this.size = ENGINE_CONFIG.PLAYER_SIZE;
        
        // Create character geometry (Roblox blocky style)
        this.group = new THREE.Group();
        
        const matBody = new THREE.MeshStandardMaterial({ color: 0x00ffcc, roughness: 0.4 });
        const matSkin = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.6 });
        const matPants = new THREE.MeshStandardMaterial({ color: 0x3366ff, roughness: 0.8 });
        
        // Torso
        const torso = new THREE.Mesh(new THREE.BoxGeometry(this.size, this.size*1.2, this.size*0.5), matBody);
        this.group.add(torso);
        
        // Head
        const head = new THREE.Mesh(new THREE.BoxGeometry(this.size*0.8, this.size*0.8, this.size*0.8), matSkin);
        head.position.y = this.size;
        this.group.add(head);
        
        // Arms
        const armL = new THREE.Mesh(new THREE.BoxGeometry(this.size*0.4, this.size*1.2, this.size*0.4), matBody);
        armL.position.set(-this.size*0.8, 0, 0);
        armL.rotation.x = Math.PI; // Raised up for falling
        this.group.add(armL);
        
        const armR = new THREE.Mesh(new THREE.BoxGeometry(this.size*0.4, this.size*1.2, this.size*0.4), matBody);
        armR.position.set(this.size*0.8, 0, 0);
        armR.rotation.x = Math.PI;
        this.group.add(armR);
        
        this.group.castShadow = true;
        this.scene.add(this.group);
        
        this.collider = new AABB(0, 0, 0, this.size*1.6, this.size*2.0, this.size);
        this.velocity = new THREE.Vector3();
        this.isDead = false;
    }

    reset(yStart) {
        this.group.position.set(0, yStart, 0);
        this.velocity.set(0, 0, 0);
        this.group.rotation.set(Math.PI/2, 0, 0); // Face down
        this.group.visible = true;
        this.isDead = false;
        this.updateCollider();
    }

    update(dt, input) {
        if (this.isDead) return;

        const axis = input.getAxis();
        
        // Apply acceleration
        this.velocity.x += axis.x * ENGINE_CONFIG.PLAYER_SPEED * dt;
        this.velocity.z += axis.y * ENGINE_CONFIG.PLAYER_SPEED * dt;
        
        // Apply friction
        this.velocity.x *= ENGINE_CONFIG.FRICTION;
        this.velocity.z *= ENGINE_CONFIG.FRICTION;
        
        // Apply gravity
        this.velocity.y -= ENGINE_CONFIG.BASE_GRAVITY * dt;
        if (this.velocity.y < -ENGINE_CONFIG.MAX_TERMINAL_VELOCITY) {
            this.velocity.y = -ENGINE_CONFIG.MAX_TERMINAL_VELOCITY;
        }

        // Move
        this.group.position.addScaledVector(this.velocity, dt);

        // Tunnel Bounds Collision
        const halfT = ENGINE_CONFIG.TUNNEL_WIDTH / 2 - this.size;
        if (this.group.position.x > halfT) { this.group.position.x = halfT; this.velocity.x = 0; }
        if (this.group.position.x < -halfT) { this.group.position.x = -halfT; this.velocity.x = 0; }
        if (this.group.position.z > halfT) { this.group.position.z = halfT; this.velocity.z = 0; }
        if (this.group.position.z < -halfT) { this.group.position.z = -halfT; this.velocity.z = 0; }

        // Wiggle animation while falling
        this.group.rotation.y = Math.sin(Date.now() * 0.01) * 0.1 + (this.velocity.x * 0.01);
        this.group.rotation.z = (this.velocity.z * 0.01);

        this.updateCollider();
    }

    updateCollider() {
        this.collider.update(
            this.group.position.x, 
            this.group.position.y, 
            this.group.position.z, 
            this.size*1.6, this.size*2.0, this.size
        );
    }

    die() {
        this.isDead = true;
        this.group.visible = false;
    }
}

class Obstacle {
    constructor(scene, def) {
        this.scene = scene;
        this.def = def;
        
        const geo = new THREE.BoxGeometry(def.w, def.h, def.d);
        let mat;
        
        if (def.type === 'lava') {
            mat = new THREE.ShaderMaterial({
                vertexShader: Shaders.tunnelVertex, // Reuse standard vertex
                fragmentShader: Shaders.lavaFragment,
                uniforms: { time: { value: 0 } }
            });
        } else {
            mat = new THREE.MeshStandardMaterial({ 
                color: def.color || 0xffffff,
                roughness: 0.3,
                metalness: 0.2
            });
        }
        
        this.mesh = new THREE.Mesh(geo, mat);
        this.mesh.position.set(def.x, def.y, def.z);
        
        if (def.rotX) this.mesh.rotation.x = def.rotX;
        if (def.rotY) this.mesh.rotation.y = def.rotY;
        if (def.rotZ) this.mesh.rotation.z = def.rotZ;

        this.mesh.castShadow = true;
        this.mesh.receiveShadow = true;
        this.scene.add(this.mesh);
        
        this.collider = new AABB(def.x, def.y, def.z, def.w, def.h, def.d);
        
        this.timeOffset = Math.random() * 100;
    }

    update(dt, time) {
        if (this.def.type === 'lava' && this.mesh.material.uniforms) {
            this.mesh.material.uniforms.time.value = time;
        }
        
        if (this.def.moveAxis) {
            const speed = this.def.moveSpeed || 10;
            const range = this.def.moveRange || 20;
            const offset = Math.sin(time * speed + this.timeOffset) * range;
            
            if (this.def.moveAxis === 'x') this.mesh.position.x = this.def.x + offset;
            if (this.def.moveAxis === 'z') this.mesh.position.z = this.def.z + offset;
            
            // Note: Rotation updates would need complex OBB, using simplified AABB for speed
            this.collider.update(this.mesh.position.x, this.mesh.position.y, this.mesh.position.z, this.def.w, this.def.h, this.def.d);
        }
        
        if (this.def.rotSpeed) {
            this.mesh.rotation.y += this.def.rotSpeed * dt;
        }
    }

    destroy() {
        this.scene.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
    }
}

class SafeZone {
    constructor(scene, y, size) {
        this.scene = scene;
        this.y = y;
        this.size = size;
        
        // Water/Safe block
        const geo = new THREE.BoxGeometry(size, 10, size);
        const mat = new THREE.MeshStandardMaterial({
            color: ENGINE_CONFIG.COLORS.SAFE,
            transparent: true,
            opacity: 0.6,
            roughness: 0.1,
            metalness: 0.1
        });
        this.mesh = new THREE.Mesh(geo, mat);
        this.mesh.position.set(0, y - 5, 0);
        this.scene.add(this.mesh);
        
        // Solid base to catch player entirely
        const baseGeo = new THREE.BoxGeometry(ENGINE_CONFIG.TUNNEL_WIDTH, 20, ENGINE_CONFIG.TUNNEL_WIDTH);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        this.baseMesh = new THREE.Mesh(baseGeo, baseMat);
        this.baseMesh.position.set(0, y - 20, 0);
        this.scene.add(this.baseMesh);
        
        this.safeCollider = new AABB(0, y - 5, 0, size, 10, size);
        this.floorCollider = new AABB(0, y - 20, 0, ENGINE_CONFIG.TUNNEL_WIDTH, 20, ENGINE_CONFIG.TUNNEL_WIDTH);
    }

    destroy() {
        this.scene.remove(this.mesh);
        this.scene.remove(this.baseMesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
        this.baseMesh.geometry.dispose();
        this.baseMesh.material.dispose();
    }
}

class ParticleSystem {
    constructor(scene) {
        this.scene = scene;
        this.particles = [];
        this.geo = new THREE.BoxGeometry(1, 1, 1);
        this.mat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
    }

    burst(pos, count, color) {
        if (color) this.mat.color.setHex(color);
        for (let i=0; i<count; i++) {
            const p = new THREE.Mesh(this.geo, this.mat);
            p.position.copy(pos);
            p.position.x += (Math.random()-0.5)*2;
            p.position.y += (Math.random()-0.5)*2;
            p.position.z += (Math.random()-0.5)*2;
            
            this.scene.add(p);
            this.particles.push({
                mesh: p,
                vel: new THREE.Vector3((Math.random()-0.5)*50, (Math.random()-0.5)*50 + 20, (Math.random()-0.5)*50),
                life: 1.0,
                decay: Math.random() * 0.02 + 0.01
            });
        }
    }

    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            p.vel.y -= ENGINE_CONFIG.BASE_GRAVITY * dt;
            p.mesh.position.addScaledVector(p.vel, dt);
            p.mesh.rotation.x += dt * 10;
            p.mesh.rotation.y += dt * 10;
            p.life -= p.decay;
            p.mesh.scale.setScalar(p.life);
            
            if (p.life <= 0) {
                this.scene.remove(p.mesh);
                this.particles.splice(i, 1);
            }
        }
    }

    clear() {
        for(let p of this.particles) this.scene.remove(p.mesh);
        this.particles = [];
    }
}

// ============================================================================
// MASSIVE LEVEL GENERATION DATA
// ============================================================================
class LevelBuilder {
    static generateLevel(levelIndex) {
        const data = {
            depth: 800 + (levelIndex * 200),
            obstacles: [],
            safeSize: Math.max(10, 40 - (levelIndex * 1.5))
        };
        
        const tw = ENGINE_CONFIG.TUNNEL_WIDTH;
        const hw = tw / 2;
        
        // Level 1: The Basics
        if (levelIndex === 1) {
            data.depth = 1000;
            data.obstacles.push({ type: 'solid', x: -15, y: -200, z: 0, w: tw/2, h: 5, d: tw, color: 0xff0000 });
            data.obstacles.push({ type: 'solid', x: 15, y: -400, z: 0, w: tw/2, h: 5, d: tw, color: 0x00ff00 });
            data.obstacles.push({ type: 'solid', x: 0, y: -600, z: 15, w: tw, h: 5, d: tw/2, color: 0x0000ff });
            data.obstacles.push({ type: 'solid', x: 0, y: -800, z: -15, w: tw, h: 5, d: tw/2, color: 0xffff00 });
            return data;
        }
        
        // Level 2: Grids
        if (levelIndex === 2) {
            for(let y = -200; y > -data.depth + 100; y -= 200) {
                data.obstacles.push({ type: 'lava', x: 0, y: y, z: 0, w: 10, h: 5, d: tw });
                data.obstacles.push({ type: 'lava', x: 0, y: y, z: 0, w: tw, h: 5, d: 10 });
            }
            return data;
        }

        // Level 3: Moving Madness
        if (levelIndex === 3) {
            for(let y = -150; y > -data.depth + 100; y -= 150) {
                data.obstacles.push({ 
                    type: 'solid', x: 0, y: y, z: 0, w: tw*0.6, h: 10, d: 10, color: 0xff00ff,
                    moveAxis: 'x', moveSpeed: 2, moveRange: hw - (tw*0.6)/2
                });
            }
            return data;
        }

        // Procedural Generation for higher levels to save raw lines but maintain complexity
        const numSlices = Math.floor(data.depth / 80);
        
        for (let i = 1; i < numSlices - 1; i++) {
            let y = -(i * 80);
            let diff = levelIndex / ENGINE_CONFIG.TOTAL_LEVELS;
            
            let r = Math.random();
            let c = ENGINE_CONFIG.COLORS.RAINBOW[Math.floor(Math.random() * ENGINE_CONFIG.COLORS.RAINBOW.length)];
            
            if (r < 0.2) {
                // Crosshair
                let rot = Math.random() * Math.PI;
                data.obstacles.push({ type: 'solid', x: 0, y: y, z: 0, w: tw, h: 4, d: 4, color: c, rotY: rot });
                data.obstacles.push({ type: 'solid', x: 0, y: y, z: 0, w: 4, h: 4, d: tw, color: c, rotY: rot });
            } 
            else if (r < 0.4) {
                // Moving platform
                data.obstacles.push({ 
                    type: 'solid', x: 0, y: y, z: 0, w: 15, h: 15, d: 15, color: c,
                    moveAxis: Math.random() > 0.5 ? 'x' : 'z',
                    moveSpeed: 1 + diff * 5,
                    moveRange: 15
                });
            }
            else if (r < 0.6) {
                // Rings (Square)
                data.obstacles.push({ type: 'solid', x: hw-5, y: y, z: 0, w: 10, h: 4, d: tw, color: c });
                data.obstacles.push({ type: 'solid', x: -hw+5, y: y, z: 0, w: 10, h: 4, d: tw, color: c });
                data.obstacles.push({ type: 'solid', x: 0, y: y, z: hw-5, w: tw-20, h: 4, d: 10, color: c });
                data.obstacles.push({ type: 'solid', x: 0, y: y, z: -hw+5, w: tw-20, h: 4, d: 10, color: c });
            }
            else if (r < 0.8 && levelIndex > 5) {
                // Lava blocks
                data.obstacles.push({ type: 'lava', x: (Math.random()-0.5)*tw*0.5, y: y, z: (Math.random()-0.5)*tw*0.5, w: 20, h: 10, d: 20 });
            }
            else {
                // Scatter blocks
                for(let j=0; j<3; j++) {
                    data.obstacles.push({ 
                        type: 'solid', 
                        x: (Math.random()-0.5)*tw*0.8, y: y + (Math.random()*20-10), z: (Math.random()-0.5)*tw*0.8, 
                        w: 10 + Math.random()*10, h: 5, d: 10 + Math.random()*10, 
                        color: c 
                    });
                }
            }
        }
        
        // Level 20 Extreme Finale Override
        if (levelIndex === 20) {
            data.safeSize = 6;
            data.depth = 5000;
            data.obstacles = [];
            for(let y = -50; y > -4900; y -= 40) {
                let rot = (y / 40) * 0.5;
                data.obstacles.push({ type: 'lava', x: 0, y: y, z: 0, w: tw*0.8, h: 4, d: 4, rotY: rot });
                data.obstacles.push({ type: 'lava', x: 0, y: y, z: 0, w: 4, h: 4, d: tw*0.8, rotY: rot });
            }
        }

        return data;
    }
}

// ============================================================================
// CORE ENGINE LOOP & STATE MANAGEMENT
// ============================================================================
class GameEngine {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: false, powerPreference: "high-performance" });
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.BasicShadowMap;
        
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000000);
        
        this.camera = new THREE.PerspectiveCamera(ENGINE_CONFIG.FOV, window.innerWidth / window.innerHeight, 0.1, 2000);
        this.camOffset = new THREE.Vector3(0, 8, 4);
        
        // Lighting
        const amb = new THREE.AmbientLight(0xffffff, 0.6);
        this.scene.add(amb);
        
        this.dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        this.dirLight.position.set(20, 50, 20);
        this.dirLight.castShadow = true;
        this.dirLight.shadow.camera.left = -30;
        this.dirLight.shadow.camera.right = 30;
        this.dirLight.shadow.camera.top = 30;
        this.dirLight.shadow.camera.bottom = -30;
        this.scene.add(this.dirLight);
        
        this.pointLight = new THREE.PointLight(0xffffff, 1, 100);
        this.scene.add(this.pointLight);

        // Modules
        this.input = new InputController();
        this.audio = new AudioEngine();
        this.player = new Player(this.scene);
        this.particles = new ParticleSystem(this.scene);
        
        // State
        this.state = GAME_STATES.BOOT;
        this.level = 1;
        this.fails = 0;
        this.obstacles = [];
        this.safeZone = null;
        this.tunnelMesh = null;
        this.tunnelMat = null;
        
        this.clock = new THREE.Clock();
        this.time = 0;
        
        // UI
        this.uiTitle = document.getElementById('title-text');
        this.uiAction = document.getElementById('action-text');
        this.uiOverlay = document.getElementById('center-overlay');
        this.uiLevel = document.getElementById('level-display');
        this.uiFails = document.getElementById('fails-display');
        
        window.addEventListener('resize', () => this.resize());
        this.resize();
        
        this.setState(GAME_STATES.MENU);
        this.loop();
    }

    resize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
    }

    setState(newState) {
        this.state = newState;
        this.uiOverlay.classList.remove('hidden');
        
        switch(newState) {
            case GAME_STATES.MENU:
                this.uiTitle.innerText = "DUMBODROPPER 3D";
                this.uiAction.innerText = "PRESS SPACE TO DROP";
                this.buildLevel(this.level);
                break;
            case GAME_STATES.PLAYING:
                this.uiOverlay.classList.add('hidden');
                this.audio.init();
                this.audio.playDropSound();
                break;
            case GAME_STATES.DEAD:
                this.uiTitle.innerText = "SPLAT!";
                this.uiAction.innerText = "PRESS SPACE TO RETRY";
                this.fails++;
                this.uiFails.innerText = `Fails: ${this.fails}`;
                this.audio.playDeathSound();
                this.player.die();
                this.particles.burst(this.player.group.position, 100, 0xff0000);
                break;
            case GAME_STATES.VICTORY:
                this.uiTitle.innerText = "SAFE!";
                this.uiAction.innerText = "PRESS SPACE FOR NEXT LEVEL";
                this.audio.playWinSound();
                this.player.velocity.set(0,0,0);
                break;
            case GAME_STATES.GAME_OVER:
                this.uiTitle.innerText = "YOU BEAT THE DROPPER";
                this.uiAction.innerText = "REFRESH TO RESTART";
                this.audio.playWinSound();
                break;
        }
    }

    clearLevel() {
        for (let obs of this.obstacles) obs.destroy();
        this.obstacles = [];
        if (this.safeZone) this.safeZone.destroy();
        if (this.tunnelMesh) {
            this.scene.remove(this.tunnelMesh);
            this.tunnelMesh.geometry.dispose();
            this.tunnelMat.dispose();
        }
        this.particles.clear();
    }

    buildLevel(levelIndex) {
        this.clearLevel();
        this.uiLevel.innerText = `Level: ${levelIndex} / ${ENGINE_CONFIG.TOTAL_LEVELS}`;
        
        const data = LevelBuilder.generateLevel(levelIndex);
        const tw = ENGINE_CONFIG.TUNNEL_WIDTH;
        
        // Build Procedural Tunnel
        const tunnelGeo = new THREE.BoxGeometry(tw, data.depth, tw);
        this.tunnelMat = new THREE.ShaderMaterial({
            vertexShader: Shaders.tunnelVertex,
            fragmentShader: Shaders.tunnelFragment,
            uniforms: {
                time: { value: 0 },
                length: { value: data.depth }
            },
            side: THREE.BackSide
        });
        
        this.tunnelMesh = new THREE.Mesh(tunnelGeo, this.tunnelMat);
        this.tunnelMesh.position.y = -data.depth/2 + 20; // Start slightly above 0
        this.scene.add(this.tunnelMesh);

        // Build Obstacles
        for (let oDef of data.obstacles) {
            this.obstacles.push(new Obstacle(this.scene, oDef));
        }

        // Build Safe Zone
        this.safeZone = new SafeZone(this.scene, -data.depth + 10, data.safeSize);

        this.player.reset(0);
        this.updateCamera(true);
    }

    updateCamera(instant = false) {
        const target = this.player.group.position.clone().add(this.camOffset);
        
        if (instant) {
            this.camera.position.copy(target);
        } else {
            this.camera.position.lerp(target, ENGINE_CONFIG.CAMERA_SMOOTHING);
        }
        
        // Dynamic look ahead based on falling speed
        const lookTarget = this.player.group.position.clone();
        lookTarget.y -= 15 + Math.abs(this.player.velocity.y * 0.1);
        
        this.camera.lookAt(lookTarget);
        
        // Follow lights
        this.dirLight.position.set(this.player.group.position.x + 10, this.player.group.position.y + 20, this.player.group.position.z + 10);
        this.dirLight.target = this.player.group;
        this.pointLight.position.copy(this.player.group.position);
    }

    checkCollisions() {
        const pc = this.player.collider;
        
        // Obstacles
        for (let obs of this.obstacles) {
            if (pc.intersects(obs.collider)) {
                this.setState(GAME_STATES.DEAD);
                return;
            }
        }
        
        // Safe Zone floor / Out of bounds
        if (pc.intersects(this.safeZone.floorCollider)) {
            // Check if within safe square
            if (pc.intersects(this.safeZone.safeCollider)) {
                this.setState(GAME_STATES.VICTORY);
            } else {
                this.setState(GAME_STATES.DEAD);
            }
        }
    }

    loop() {
        requestAnimationFrame(() => this.loop());
        
        const dt = Math.min(this.clock.getDelta(), 0.1);
        this.time += dt;

        // Global Shader Updates
        if (this.tunnelMat) this.tunnelMat.uniforms.time.value = this.time;

        if (this.state === GAME_STATES.MENU) {
            if (this.input.isActionPressed()) {
                this.input.resetAction();
                this.setState(GAME_STATES.PLAYING);
            }
            // Menu camera idle
            this.camera.position.x = Math.sin(this.time) * 5;
            this.camera.position.z = Math.cos(this.time) * 5;
            this.camera.lookAt(0,-50,0);
            
        } else if (this.state === GAME_STATES.PLAYING) {
            this.player.update(dt, this.input);
            for (let obs of this.obstacles) obs.update(dt, this.time);
            this.checkCollisions();
            this.updateCamera();
            
        } else if (this.state === GAME_STATES.DEAD) {
            this.particles.update(dt);
            if (this.input.isActionPressed()) {
                this.input.resetAction();
                this.buildLevel(this.level);
                this.setState(GAME_STATES.PLAYING);
            }
            
        } else if (this.state === GAME_STATES.VICTORY) {
            if (this.input.isActionPressed()) {
                this.input.resetAction();
                this.level++;
                if (this.level > ENGINE_CONFIG.TOTAL_LEVELS) {
                    this.setState(GAME_STATES.GAME_OVER);
                } else {
                    this.buildLevel(this.level);
                    this.setState(GAME_STATES.PLAYING);
                }
            }
        }

        this.renderer.render(this.scene, this.camera);
    }
}

// Bootstrap
window.onload = () => {
    const game = new GameEngine();
};
</script>
